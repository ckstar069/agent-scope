stages:
  - verify
  - build
  - release

variables:
  NODE_VERSION: "20"
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.cache/ms-playwright"
  CARGO_NET_RETRY: "3"
  CARGO_HTTP_TIMEOUT: "120"

# 缓存依赖目录，避免重复下载
# 评估结论：保留全部 4 个目录；ms-playwright 缓存浏览器文件价值最高
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - .cargo/registry/
    - .cargo/git/
    - .cache/ms-playwright/

# -----------------------------------------------------------------------------
# Verify Stage: 代码检查、测试（Push / MR 时触发）
# -----------------------------------------------------------------------------

verify:
  stage: verify
  image: agent-scope-ci:node20-rust1.95
  tags:
    - linux
  before_script:
    - echo "=== 安装前端依赖 ==="
    - npm ci
    - echo "=== 安装 Playwright 浏览器 ==="
    - npx playwright install chromium
  script:
    - echo "=== 构建前端 ==="
    - npm run build
    - echo "=== Rust 格式化检查 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo fmt --check
    - echo "=== Rust Clippy 检查 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo clippy -- -D warnings
    - echo "=== Rust 检查 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo check
    - echo "=== Rust 测试 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo test
    - echo "=== Rust 安全审计 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo audit || echo "cargo audit 发现警告（非阻塞）"
    - echo "=== npm 安全审计 ==="
    - npm audit --audit-level=moderate || echo "npm audit 发现警告（非阻塞）"
    - echo "=== E2E 测试 ==="
    - npm test
  artifacts:
    when: always
    paths:
      - .sisyphus/evidence/e2e/report/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# -----------------------------------------------------------------------------
# Build Stage: 桌面应用构建（Tag Push 时触发）
# -----------------------------------------------------------------------------

# 版本号同步脚本：将 Git tag (vX.Y.Z) 同步到 package.json 和 Cargo.toml
.sync-version: &sync-version-script
  - |
    VERSION=${CI_COMMIT_TAG#v}
    echo "Tag: $CI_COMMIT_TAG -> Version: $VERSION"
    # 更新 package.json
    node -e "const fs=require('fs'); const f='package.json'; const p=JSON.parse(fs.readFileSync(f)); p.version='$VERSION'; fs.writeFileSync(f, JSON.stringify(p,null,2)+'\n'); console.log('Updated', f, '->', p.version);"
    # 更新 Cargo.toml
    sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
    echo "Updated src-tauri/Cargo.toml -> $VERSION"
    # tauri.conf.json 已配置为读取 package.json 版本号，无需额外修改

build:linux:
  stage: build
  image: agent-scope-ci:node20-rust1.95
  tags:
    - linux
  variables:
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
    APPIMAGE_EXTRACT_AND_RUN: "1"
    NO_STRIP: "true"
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
      - .cargo/registry/
      - .cargo/git/
  before_script:
    - echo "=== 同步版本号 ==="
    - *sync-version-script
    - echo "=== 安装前端依赖 ==="
    - npm ci
  script:
    - echo "=== 构建前端 ==="
    - npm run build
    - echo "=== 构建 Linux 桌面应用 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo tauri build --target x86_64-unknown-linux-gnu
  artifacts:
    when: on_success
    paths:
      - src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
      - src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
    expire_in: 1 month
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/'

build:windows:
  stage: build
  tags:
    - windows
  variables:
    CARGO_HOME: "$CI_PROJECT_DIR\\.cargo"
    npm_config_cache: "$CI_PROJECT_DIR\\.npm"
    GIT_STRATEGY: clone
    CI_COMMIT_AUTHOR: "ckstar"
    GIT_COMMITTER_NAME: "ckstar"
    GIT_COMMITTER_EMAIL: "ckstar@localhost"
    GIT_AUTHOR_NAME: "ckstar"
    GIT_AUTHOR_EMAIL: "ckstar@localhost"
    # Tauri bundler 使用 dirs::cache_dir() 在 Windows 上读取 LOCALAPPDATA。
    # GitLab Runner 以 LocalSystem 运行，默认指向 systemprofile 目录，
    # 但 systemprofile 下的 NSIS 缓存因权限问题导致 makensis 无法读取 stubs。
    # 强制使用 yufei 用户的缓存目录（已预装完整 NSIS toolset）。
    LOCALAPPDATA: "C:\\Users\\yufei\\AppData\\Local"
  cache:
    key: ${CI_COMMIT_REF_SLUG}-windows
    paths:
      - .npm/
      - .cargo/registry/
      - .cargo/git/
  before_script:
    - |
      echo "=== 配置环境变量 ==="
      $env:Path += ";C:\Users\yufei\.cargo\bin"
      rustup default stable
      cargo --version
      echo "=== 添加 NSIS 到 PATH ==="
      $env:Path = "C:\PROGRA~2\NSIS\Bin;$env:Path"
      Get-Command makensis | Select-Object Source
      makensis -VERSION
    - echo "=== 同步版本号 ==="
    - |
      $VERSION = $env:CI_COMMIT_TAG -replace '^v',''
      Write-Host "Tag: $env:CI_COMMIT_TAG -> Version: $VERSION"
      node -e "const fs=require('fs'); const f='package.json'; const p=JSON.parse(fs.readFileSync(f)); p.version='$VERSION'; fs.writeFileSync(f, JSON.stringify(p,null,2)+'\n'); console.log('Updated', f, '->', p.version);"
      (Get-Content src-tauri/Cargo.toml -Raw) -replace '^version = ".*"', "version = `"$VERSION`"" | Set-Content src-tauri/Cargo.toml -NoNewline
      Write-Host "Updated src-tauri/Cargo.toml -> $VERSION"
    - echo "=== 安装前端依赖 ==="
    - npm ci
    - |
      echo "=== 修复 Tauri bundler NSIS 缓存路径 ==="
      # LocalSystem 账户的 systemprofile 目录因安全限制无法启动 makensis 子进程。
      # 修改 tauri-bundler 源代码，将 dirs::cache_dir() 硬编码为 yufei 用户目录。
      $$bundlerPath = "C:\Users\yufei\.cargo\registry\src\index.crates.io-1949cf8c6b5b557f\tauri-bundler-2.9.1\src\bundle\windows\nsis\mod.rs"
      if (Test-Path $$bundlerPath) {
        $$content = Get-Content $$bundlerPath -Raw
        $$content = $$content -replace 'dirs::cache_dir\(\)\.unwrap\(\)\.join\("tauri"\)', 'std::path::PathBuf::from(r"C:\Users\yufei\AppData\Local").join("tauri")'
        Set-Content $$bundlerPath $$content -NoNewline
        Write-Host "Patched tauri-bundler: $$bundlerPath"
      } else {
        Write-Host "WARNING: Could not find tauri-bundler nsis/mod.rs at $$bundlerPath"
      }
      echo "=== 重新编译 cargo-tauri（使用 patch 后的 tauri-bundler）==="
      cargo install tauri-cli --force
      echo "=== 将新编译的 cargo-tauri 前置到 PATH ==="
      $env:Path = "$env:CI_PROJECT_DIR\.cargo\bin;$env:Path"
      Get-Command cargo-tauri | Select-Object Source
  script:
    - echo "=== 构建前端 ==="
    - npm run build
    - |
      echo "=== 配置构建环境 ==="
      $env:Path = "C:\Program Files (x86)\NSIS\Bin;$env:CI_PROJECT_DIR\.cargo\bin;C:\Users\yufei\.cargo\bin;$env:Path"
      Get-Command makensis | Select-Object Source
      makensis -VERSION
      Get-Command cargo-tauri | Select-Object Source
      echo "=== 构建 Windows 桌面应用 ==="
      cargo tauri build --target x86_64-pc-windows-msvc
      echo "=== 打包 Portable 免安装版 ==="
      $VERSION = $env:CI_COMMIT_TAG -replace '^v',''
      $TARGET = "x86_64-pc-windows-msvc"
      $RELEASE_DIR = "src-tauri/target/$TARGET/release"
      $ZIP_NAME = "AgentScope_${VERSION}_x64_portable.zip"
      $PORTABLE_DIR = "$RELEASE_DIR/bundle/portable"
      New-Item -ItemType Directory -Path $PORTABLE_DIR -Force | Out-Null
      Compress-Archive -Path "$RELEASE_DIR/agent-scope.exe" -DestinationPath "$PORTABLE_DIR/$ZIP_NAME" -Force
      Write-Host "Created portable: $PORTABLE_DIR/$ZIP_NAME"
  artifacts:
    when: on_success
    paths:
      - src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
      - src-tauri/target/x86_64-pc-windows-msvc/release/bundle/portable/*.zip
    expire_in: 1 month
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/'

# -----------------------------------------------------------------------------
# Release Stage: 创建 GitLab Release 并汇总产物
# -----------------------------------------------------------------------------

release:
  stage: release
  image: alpine:latest
  tags:
    - linux
  needs:
    - job: build:linux
      artifacts: true
    - job: build:windows
      artifacts: true
  script:
    - apk add --no-cache curl jq
    - echo "=== 收集产物 ==="
    - |
      DEB=$(find . -name "*.deb" | head -1)
      APPIMAGE=$(find . -name "*.AppImage" | head -1)
      EXE=$(find . -name "*.exe" | head -1)
      ZIP=$(find . -name "*.zip" | head -1)

      echo "deb: $DEB"
      echo "appimage: $APPIMAGE"
      echo "exe: $EXE"
      echo "zip: $ZIP"
    - echo "=== 上传产物到 Generic Package Registry ==="
    - |
      VERSION=${CI_COMMIT_TAG#v}
      PKG_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/agent-scope/${VERSION}"

      upload_pkg() {
        local file="$1"
        local name="$2"
        if [ -n "$file" ]; then
          echo "Uploading $name: $file"
          curl -k --fail --request PUT \
            --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            --upload-file "$file" \
            "${PKG_URL}/$(basename "$file")"
          echo ""
        else
          echo "Skipping $name (not found)"
        fi
      }

      upload_pkg "$DEB"     "deb"
      upload_pkg "$APPIMAGE" "AppImage"
      upload_pkg "$EXE"      "exe"
      upload_pkg "$ZIP"      "zip"
    - echo "=== 创建 GitLab Release ==="
    - |
      VERSION=${CI_COMMIT_TAG#v}
      PKG_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/agent-scope/${VERSION}"

      DEB=$(find . -name "*.deb" | head -1)
      APPIMAGE=$(find . -name "*.AppImage" | head -1)
      EXE=$(find . -name "*.exe" | head -1)
      ZIP=$(find . -name "*.zip" | head -1)

      # 构建 Release 描述
      DESC=$(printf '## AgentScope %s\n\n### Linux\n' "${CI_COMMIT_TAG}")
      [ -n "$DEB" ]     && DESC=$(printf '%s- deb: `%s`\n' "$DESC" "$(basename "$DEB")")
      [ -n "$APPIMAGE" ] && DESC=$(printf '%s- AppImage (免安装): `%s`\n' "$DESC" "$(basename "$APPIMAGE")")
      DESC=$(printf '%s\n### Windows\n' "$DESC")
      [ -n "$EXE" ]     && DESC=$(printf '%s- Installer: `%s`\n' "$DESC" "$(basename "$EXE")")
      [ -n "$ZIP" ]     && DESC=$(printf '%s- Portable (免安装): `%s`\n' "$DESC" "$(basename "$ZIP")")
      DESC=$(printf '%s\n---\n各平台安装包已上传至 GitLab Package Registry，点击下方 Assets 下载。' "$DESC")

      # 构建 assets links（指向 Generic Package Registry，链接永久有效）
      LINKS="[]"
      [ -n "$DEB" ]     && LINKS=$(echo "$LINKS" | jq ". + [{\"name\":\"Linux deb\",\"url\":\"${PKG_URL}/$(basename "$DEB")\",\"link_type\":\"package\"}]")
      [ -n "$APPIMAGE" ] && LINKS=$(echo "$LINKS" | jq ". + [{\"name\":\"Linux AppImage\",\"url\":\"${PKG_URL}/$(basename "$APPIMAGE")\",\"link_type\":\"package\"}]")
      [ -n "$EXE" ]     && LINKS=$(echo "$LINKS" | jq ". + [{\"name\":\"Windows Installer\",\"url\":\"${PKG_URL}/$(basename "$EXE")\",\"link_type\":\"package\"}]")
      [ -n "$ZIP" ]     && LINKS=$(echo "$LINKS" | jq ". + [{\"name\":\"Windows Portable\",\"url\":\"${PKG_URL}/$(basename "$ZIP")\",\"link_type\":\"package\"}]")

      # 创建 Release（-k 跳过自签名证书验证）
      curl -k --fail --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\": \"AgentScope ${CI_COMMIT_TAG}\",
          \"tag_name\": \"${CI_COMMIT_TAG}\",
          \"description\": $(echo -n "$DESC" | jq -sR .),
          \"assets\": { \"links\": ${LINKS} }
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"

      echo "Release created successfully"
  artifacts:
    paths:
      - "**/*.deb"
      - "**/*.AppImage"
      - "**/*.exe"
      - "**/*.zip"
    expire_in: 1 month
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
