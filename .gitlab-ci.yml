stages:
  - verify

variables:
  NODE_VERSION: "20"
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

verify:
  stage: verify
  image: ubuntu:22.04
  before_script:
    - echo "=== 安装系统依赖 ==="
    - apt-get update -qq
    - apt-get install -y -qq libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf curl build-essential git
    - echo "=== 安装 Node.js ==="
    - curl -fsSL https://deb.nodesource.com/setup_${NODE_VERSION}.x | bash -
    - apt-get install -y -qq nodejs
    - echo "=== 安装 Rust ==="
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - source "$CARGO_HOME/env"
    - echo "=== 安装前端依赖 ==="
    - npm ci
    - echo "=== 安装 Playwright 浏览器 ==="
    - npx playwright install chromium
  script:
    - echo "=== 构建前端 ==="
    - npm run build
    - echo "=== Rust 检查 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo check
    - echo "=== Rust 测试 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo test
    - echo "=== E2E 测试 ==="
    - npm test || echo "E2E tests exited with $? (non-blocking)"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
