stages:
  - verify
  - build
  - release

variables:
  NODE_VERSION: "20"
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  npm_config_registry: "https://registry.npmmirror.com"
  PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.cache/ms-playwright"
  CARGO_REGISTRIES_CRATES_IO_INDEX: "sparse+https://rsproxy.cn/index/"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
  CARGO_NET_RETRY: "3"
  CARGO_HTTP_TIMEOUT: "120"

# 缓存依赖目录，避免重复下载
# 评估结论：保留全部 4 个目录；ms-playwright 缓存浏览器文件价值最高
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - .cargo/registry/
    - .cargo/git/
    - .cache/ms-playwright/

# -----------------------------------------------------------------------------
# Verify Stage: 代码检查、测试（Push / MR 时触发）
# -----------------------------------------------------------------------------

verify:
  stage: verify
  image: agent-scope-ci:node20-rust1.95
  tags:
    - linux
  before_script:
    - echo "=== 安装前端依赖 ==="
    # 镜像内固定 npm 10.9.8；registry 固定为 npmmirror，避免 Runner 到 npmjs EOF/挂起。
    # 见 docs/desktop-ci-cd-lessons.md §5.12
    - bash scripts/ci-npm-install.sh --no-audit --no-fund
    - echo "=== 安装 Playwright 浏览器 ==="
    - npx playwright install chromium
  script:
    - echo "=== 构建前端 ==="
    - npm run build
    - echo "=== Rust 格式化检查 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo fmt --check
    - echo "=== Rust Clippy 检查 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo clippy -- -D warnings
    - echo "=== Rust 检查 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo check
    - echo "=== Rust 测试 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo test
    - echo "=== Rust 安全审计 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo audit || echo "cargo audit 发现警告（非阻塞）"
    - echo "=== npm 安全审计 ==="
    - npm audit --audit-level=moderate || echo "npm audit 发现警告（非阻塞）"
    - echo "=== E2E 测试 ==="
    - npm test
  artifacts:
    when: always
    paths:
      - .sisyphus/evidence/e2e/report/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# -----------------------------------------------------------------------------
# Build Stage: 桌面应用构建（Tag Push 时触发）
# -----------------------------------------------------------------------------

# 版本号同步脚本：将 Git tag (vX.Y.Z) 同步到 package.json 和 Cargo.toml
.sync-version: &sync-version-script
  - |
    VERSION=${CI_COMMIT_TAG#v}
    echo "Tag: $CI_COMMIT_TAG -> Version: $VERSION"
    # 更新 package.json
    node -e "const fs=require('fs'); const f='package.json'; const p=JSON.parse(fs.readFileSync(f)); p.version='$VERSION'; fs.writeFileSync(f, JSON.stringify(p,null,2)+'\n'); console.log('Updated', f, '->', p.version);"
    # 更新 Cargo.toml
    sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
    echo "Updated src-tauri/Cargo.toml -> $VERSION"
    # tauri.conf.json 已配置为读取 package.json 版本号，无需额外修改

build:linux:
  stage: build
  image: agent-scope-ci:node20-rust1.95
  tags:
    - linux
  variables:
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
    npm_config_registry: "https://registry.npmmirror.com"
    CARGO_REGISTRIES_CRATES_IO_INDEX: "sparse+https://rsproxy.cn/index/"
    CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
    APPIMAGE_EXTRACT_AND_RUN: "1"
    NO_STRIP: "true"
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
      - .cargo/registry/
      - .cargo/git/
  before_script:
    - echo "=== 同步版本号 ==="
    - *sync-version-script
    - echo "=== 安装前端依赖 ==="
    # 同 verify job，使用固定 npm + npmmirror registry。见 §5.12
    - bash scripts/ci-npm-install.sh --no-audit --no-fund
    - echo "=== 预置 Tauri AppImage 工具 ==="
    - mkdir -p src-tauri/target/.tauri
    - install -m 755 ci/tauri-tools/linux-x86_64/* src-tauri/target/.tauri/
  script:
    - echo "=== 构建前端 ==="
    - npm run build
    - echo "=== 构建 Linux 桌面应用 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo tauri build --target x86_64-unknown-linux-gnu
  artifacts:
    when: on_success
    paths:
      - src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
      - src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
    expire_in: 1 day
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/'

build:windows:
  stage: build
  tags:
    - windows
  variables:
    CARGO_HOME: "$CI_PROJECT_DIR\\.cargo"
    npm_config_cache: "$CI_PROJECT_DIR\\.npm"
    GIT_STRATEGY: clone
    # 覆盖 commit 相关变量，避免 PowerShell executor 因多行 commit message 解析失败
    CI_COMMIT_DESCRIPTION: ""
    CI_COMMIT_MESSAGE: ""
    CI_COMMIT_AUTHOR: "ckstar"
    GIT_COMMITTER_NAME: "ckstar"
    GIT_COMMITTER_EMAIL: "ckstar@localhost"
    GIT_AUTHOR_NAME: "ckstar"
    GIT_AUTHOR_EMAIL: "ckstar@localhost"
    # Tauri bundler 使用 dirs::cache_dir() 在 Windows 上读取 LOCALAPPDATA。
    # GitLab Runner 以 LocalSystem 运行，默认指向 systemprofile 目录，
    # 但 systemprofile 下的 NSIS 缓存因权限问题导致 makensis 无法读取 stubs。
    # 强制使用 yufei 用户的缓存目录（已预装完整 NSIS toolset）。
    LOCALAPPDATA: "C:\\Users\\yufei\\AppData\\Local"
  cache:
    key: ${CI_COMMIT_REF_SLUG}-windows
    paths:
      - .npm/
      - .cargo/registry/
      - .cargo/git/
  before_script:
    - |
      $ErrorActionPreference = "Stop"
      echo "=== 配置环境变量 ==="
      $env:Path += ";C:\Users\yufei\.cargo\bin"
      rustup default stable
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      cargo --version
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      echo "=== 添加 NSIS 到 PATH ==="
      $env:Path = "C:\PROGRA~2\NSIS\Bin;$env:Path"
      Get-Command makensis | Select-Object Source
      makensis -VERSION
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    - echo "=== 同步版本号 ==="
    - |
      $ErrorActionPreference = "Stop"
      $VERSION = $env:CI_COMMIT_TAG -replace '^v',''
      Write-Host "Tag: $env:CI_COMMIT_TAG -> Version: $VERSION"
      node -e "const fs=require('fs'); const f='package.json'; const p=JSON.parse(fs.readFileSync(f)); p.version='$VERSION'; fs.writeFileSync(f, JSON.stringify(p,null,2)+'\n'); console.log('Updated', f, '->', p.version);"
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      (Get-Content src-tauri/Cargo.toml -Raw) -replace '^version = ".*"', "version = `"$VERSION`"" | Set-Content src-tauri/Cargo.toml -NoNewline
      Write-Host "Updated src-tauri/Cargo.toml -> $VERSION"
    - echo "=== 安装前端依赖 ==="
    - npm ci
  script:
    - echo "=== 构建前端 ==="
    - npm run build
    - |
      $ErrorActionPreference = "Stop"
      echo "=== 配置构建环境 ==="
      $env:Path = "C:\Program Files (x86)\NSIS\Bin;$env:Path"
      Get-Command makensis | Select-Object Source
      makensis -VERSION
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      echo "=== 构建 Windows 桌面应用 (npx tauri, 使用 package-lock 锁定版本) ==="
      npx tauri build --target x86_64-pc-windows-msvc
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      echo "=== 校验 NSIS 安装包产物 ==="
      $NSIS = Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue
      if (-not $NSIS) {
        Write-Error "NSIS installer not found; failing build"
        exit 1
      }
      Write-Host "Found NSIS installer: $($NSIS.FullName)"
      echo "=== 打包 Portable 免安装版 ==="
      $VERSION = $env:CI_COMMIT_TAG -replace '^v',''
      $TARGET = "x86_64-pc-windows-msvc"
      $RELEASE_DIR = "src-tauri/target/$TARGET/release"
      $ZIP_NAME = "AgentScope_${VERSION}_x64_portable.zip"
      $PORTABLE_DIR = "$RELEASE_DIR/bundle/portable"
      New-Item -ItemType Directory -Path $PORTABLE_DIR -Force | Out-Null
      Compress-Archive -Path "$RELEASE_DIR/agent-scope.exe" -DestinationPath "$PORTABLE_DIR/$ZIP_NAME" -Force
      Write-Host "Created portable: $PORTABLE_DIR/$ZIP_NAME"
      echo "=== 校验 Portable zip 产物 ==="
      $ZIP = Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/portable/*.zip" -ErrorAction SilentlyContinue
      if (-not $ZIP) {
        Write-Error "Portable zip not found; failing build"
        exit 1
      }
      Write-Host "Found portable zip: $($ZIP.FullName)"
  artifacts:
    when: on_success
    paths:
      - src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
      - src-tauri/target/x86_64-pc-windows-msvc/release/bundle/portable/*.zip
    expire_in: 1 day
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/'

# -----------------------------------------------------------------------------
# Release Stage: 创建 GitLab Release 并汇总产物
# -----------------------------------------------------------------------------

release:
  stage: release
  image: agent-scope-ci:node20-rust1.95
  tags:
    - linux
  needs:
    - job: build:linux
      artifacts: true
    - job: build:windows
      artifacts: true
  script:
    - echo "=== 收集产物 ==="
    - |
      DEB=$(find . -name "*.deb" | head -1)
      APPIMAGE=$(find . -name "*.AppImage" | head -1)
      EXE=$(find . -name "*.exe" | head -1)
      ZIP=$(find . -name "*.zip" | head -1)
      echo "deb: $DEB"
      echo "appimage: $APPIMAGE"
      echo "exe: $EXE"
      echo "zip: $ZIP"
      missing=0
      [ -z "$DEB" ] && echo "Missing Linux deb" && missing=1
      [ -z "$APPIMAGE" ] && echo "Missing Linux AppImage" && missing=1
      [ -z "$EXE" ] && echo "Missing Windows NSIS exe" && missing=1
      [ -z "$ZIP" ] && echo "Missing Windows portable zip" && missing=1
      [ "$missing" -ne 0 ] && echo "FATAL: one or more required artifacts missing" && exit 1
      export DEB_NAME=$(basename "$DEB")
      export APPIMAGE_NAME=$(basename "$APPIMAGE")
      export EXE_NAME=$(basename "$EXE")
      export ZIP_NAME=$(basename "$ZIP")
    - echo "=== 上传产物到 Generic Package Registry ==="
    - |
      VERSION=${CI_COMMIT_TAG#v}
      PKG_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/agent-scope/${VERSION}"
      upload_pkg() {
        local file="$1"
        local name="$2"
        echo "Uploading $name: $file"
        curl -k --fail --request PUT \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$file" \
          "${PKG_URL}/$(basename "$file")"
        echo ""
      }
      upload_pkg "$DEB"     "deb"
      upload_pkg "$APPIMAGE" "AppImage"
      upload_pkg "$EXE"      "exe"
      upload_pkg "$ZIP"      "zip"
    - echo "=== 幂等创建/确认 GitLab Release ==="
    - |
      VERSION=${CI_COMMIT_TAG#v}
      PKG_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/agent-scope/${VERSION}"
      # 收集产物（每个 script step 是独立 shell，需重新 find）
      DEB=$(find . -name "*.deb" | head -1)
      APPIMAGE=$(find . -name "*.AppImage" | head -1)
      EXE=$(find . -name "*.exe" | head -1)
      ZIP=$(find . -name "*.zip" | head -1)
      export DEB_NAME=$(basename "$DEB")
      export APPIMAGE_NAME=$(basename "$APPIMAGE")
      export EXE_NAME=$(basename "$EXE")
      export ZIP_NAME=$(basename "$ZIP")
      # 生成 Release 基本信息（不含 assets.links）
      RELEASE_JSON=$(node -e '
        const tag = process.env.CI_COMMIT_TAG;
        const deb = process.env.DEB_NAME;
        const appimage = process.env.APPIMAGE_NAME;
        const exe = process.env.EXE_NAME;
        const zip = process.env.ZIP_NAME;
        let desc = "## AgentScope " + tag + "\n\n### Linux\n";
        if (deb) { desc += "- deb: `" + deb + "`\n"; }
        if (appimage) { desc += "- AppImage (免安装): `" + appimage + "`\n"; }
        desc += "\n### Windows\n";
        if (exe) { desc += "- Installer: `" + exe + "`\n"; }
        if (zip) { desc += "- Portable (免安装): `" + zip + "`\n"; }
        desc += "\n---\n各平台安装包已上传至 GitLab Package Registry，点击下方 Assets 下载。";
        const payload = {name: "AgentScope " + tag, tag_name: tag, description: desc};
        process.stdout.write(JSON.stringify(payload));
      ')
      RELEASE_API="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}"
      # 检查 Release 是否存在
      HTTP_CODE=$(curl -k -s -o /dev/null -w "%{http_code}" \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        "$RELEASE_API")
      echo "Release check: HTTP $HTTP_CODE"
      if [ "$HTTP_CODE" = "200" ]; then
        echo "Release ${CI_COMMIT_TAG} already exists, skipping creation"
      elif [ "$HTTP_CODE" = "404" ]; then
        echo "Creating release ${CI_COMMIT_TAG}..."
        curl -k --fail --request POST \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "$RELEASE_JSON" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
        echo "Release created successfully"
      else
        echo "FATAL: unexpected HTTP code $HTTP_CODE when checking release"
        exit 1
      fi
    - echo "=== 同步 Linux/Windows asset links ==="
    - |
      VERSION=${CI_COMMIT_TAG#v}
      PKG_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/agent-scope/${VERSION}"
      # 收集产物（每个 script step 是独立 shell，需重新 find）
      DEB=$(find . -name "*.deb" | head -1)
      APPIMAGE=$(find . -name "*.AppImage" | head -1)
      EXE=$(find . -name "*.exe" | head -1)
      ZIP=$(find . -name "*.zip" | head -1)
      export DEB_NAME=$(basename "$DEB")
      export APPIMAGE_NAME=$(basename "$APPIMAGE")
      export EXE_NAME=$(basename "$EXE")
      export ZIP_NAME=$(basename "$ZIP")
      ASSET_API="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}/assets/links"
      # 获取现有 asset links（Release 不存在时返回 [] 兜底）
      EXISTING_LINKS=$(curl -k -s --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "$ASSET_API" || echo "[]")
      # 辅助函数：同步单个 asset link（幂等：存在则删除后重建）
      sync_link() {
        local link_name="$1"
        local filename="$2"
        local link_url="${PKG_URL}/${filename}"
        # 查找同名 link 的 ID
        local link_id=$(echo "$EXISTING_LINKS" | node -e "
          const links = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
          const found = links.find(l => l.name === '$link_name');
          console.log(found ? found.id : '');
        " 2>/dev/null || echo "")
        if [ -n "$link_id" ]; then
          echo "Deleting existing '$link_name' link (id=$link_id)"
          curl -k -s -o /dev/null --fail --request DELETE \
            --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            "${ASSET_API}/${link_id}" || echo "Warning: failed to delete old $link_name link"
        fi
        echo "Creating '$link_name' link -> $link_url"
        curl -k -s -o /dev/null --fail --request POST \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --data-urlencode "name=${link_name}" \
          --data-urlencode "url=${link_url}" \
          --data-urlencode "link_type=package" \
          "$ASSET_API" || echo "Warning: failed to create $link_name link"
        echo "OK: $link_name"
      }
      sync_link "Linux deb" "$DEB_NAME"
      sync_link "Linux AppImage" "$APPIMAGE_NAME"
      sync_link "Windows Installer" "$EXE_NAME"
      sync_link "Windows Portable" "$ZIP_NAME"
      echo "Asset links sync completed"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/'
