stages:
  - verify

variables:
  NODE_VERSION: "20"
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.cache/ms-playwright"
  CARGO_NET_RETRY: "3"
  CARGO_HTTP_TIMEOUT: "120"

# 缓存依赖目录，避免重复下载
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - .cargo/registry/
    - .cargo/git/
    - .cache/ms-playwright/

verify:
  stage: verify
  image: ubuntu:22.04
  before_script:
    - echo "=== 安装系统依赖 ==="
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf curl build-essential git ca-certificates
    - echo "=== 安装 Node.js ==="
    - curl -fsSL https://deb.nodesource.com/setup_${NODE_VERSION}.x | bash -
    - apt-get install -y -qq --no-install-recommends nodejs
    - echo "=== 安装 Rust ==="
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - source "$CARGO_HOME/env"
    - echo "=== 安装 cargo-binstall ==="
    - curl -L --proto '=https' --tlsv1.2 -sSf https://github.com/cargo-bins/cargo-binstall/releases/download/v1.19.1/cargo-binstall-x86_64-unknown-linux-gnu.tgz | tar -xz -C "$CARGO_HOME/bin/"
    - echo "=== 安装 cargo-audit ==="
    - cargo binstall cargo-audit --locked --no-confirm
    - echo "=== 安装前端依赖 ==="
    - npm ci
    - echo "=== 安装 Playwright 浏览器 ==="
    - npx playwright install chromium
  script:
    - echo "=== 构建前端 ==="
    - npm run build
    - echo "=== Rust 格式化检查 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo fmt --check
    - echo "=== Rust Clippy 检查 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo clippy -- -D warnings
    - echo "=== Rust 检查 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo check
    - echo "=== Rust 测试 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo test
    - echo "=== Rust 安全审计 ==="
    - cd "$CI_PROJECT_DIR/src-tauri" && cargo audit || echo "cargo audit 发现警告（非阻塞）"
    - echo "=== npm 安全审计 ==="
    - npm audit --audit-level=moderate || echo "npm audit 发现警告（非阻塞）"
    - echo "=== E2E 测试 ==="
    - npm test
  artifacts:
    when: always
    paths:
      - .sisyphus/evidence/e2e/report/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
