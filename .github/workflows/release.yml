name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.2.3)'
        required: true
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

env:
  CARGO_NET_RETRY: 3
  CARGO_HTTP_TIMEOUT: 120

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'AgentScope ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: ${{ github.event.inputs.draft != false }}
          prerelease: false
          args: ${{ matrix.args }}

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          echo "=== 生成 SHA-256 校验和 ==="
          mkdir -p checksums
          BUNDLE_DIR="src-tauri/target/release/bundle"
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            find "$BUNDLE_DIR" -maxdepth 2 -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.nsis.zip" \) -print0 2>/dev/null | while IFS= read -r -d '' file; do
              sha256sum "$file" >> "checksums/sha256-${{ matrix.platform }}-${{ matrix.target || 'x86_64' }}.txt"
            done
          else
            find "$BUNDLE_DIR" -maxdepth 2 -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.tar.gz" -o -name "*.zip" \) -print0 2>/dev/null | while IFS= read -r -d '' file; do
              sha256sum "$file" >> "checksums/sha256-${{ matrix.platform }}-${{ matrix.target || 'x86_64' }}.txt"
            done
          fi
          if [[ -f "checksums/sha256-${{ matrix.platform }}-${{ matrix.target || 'x86_64' }}.txt" ]]; then
            cat "checksums/sha256-${{ matrix.platform }}-${{ matrix.target || 'x86_64' }}.txt"
          else
            echo "未找到构建产物"
          fi

      - name: Upload checksum artifacts
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.platform }}-${{ matrix.target || 'x86_64' }}
          path: checksums/
          if-no-files-found: ignore
