name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_NET_RETRY: 3
  CARGO_HTTP_TIMEOUT: 120

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://github.com/cargo-bins/cargo-binstall/releases/download/v1.19.1/cargo-binstall-x86_64-unknown-linux-gnu.tgz | sudo tar -xz -C /usr/local/bin/

      - name: Install cargo-audit
        run: cargo binstall cargo-audit --locked --no-confirm

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cd src-tauri && cargo fmt --check

      - name: Run Clippy
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Check Rust
        run: cd src-tauri && cargo check

      - name: Run Rust tests
        run: cd src-tauri && cargo test

      - name: Run Rust security audit
        run: cd src-tauri && cargo audit
        continue-on-error: true

      - name: Run npm security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run E2E tests
        run: npm test
